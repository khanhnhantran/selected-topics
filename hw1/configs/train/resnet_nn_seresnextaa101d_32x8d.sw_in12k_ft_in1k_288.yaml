model:
  backbone: resnet_nn:timm/seresnextaa101d_32x8d.sw_in12k_ft_in1k_288
  pretrained: true
  num_classes: 100
  drop_rate: 0.2
  checkpoint: null

data:
  train_dir: data/train
  val_dir: data/val
  image_size: 288
  resize_size: 320
  crop_size: 288           # native resolution for sw_in12k_ft_in1k_288
  batch_size: 16
  num_workers: 4
  use_augmentation: true

training:
  epochs: 100
  lr: 1.0e-4               # conservative for strong IN-12K+IN-1K pretrain; 3e-4 risks feature damage
  min_lr: 1.0e-6
  weight_decay: 5.0e-3
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  label_smoothing: 0.1
  gradient_clip: 1.0
  mixup_alpha: 0.0         # 0.4 was too aggressive — suppresses visible train_acc; 0.2 is standard
  accumulation_steps: 4    # effective batch 64 → smoother gradients

output:
  checkpoint_dir: checkpoints/resnet_nn:seresnextaa101d_32x8d_sw_in12k_ft_in1k_288
  log_dir: logs/resnet_nn:seresnextaa101d_32x8d_sw_in12k_ft_in1k_288
  save_top_k: 3
